{% extends 'base.html' %}

{% block content %}
<h2>Are you sure you want to delete the note "{{ note.title }}" from the course "{{ course.title }}"?</h2>
<p>This action cannot be undone!</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
    <a href="{% url 'notes:note_list' course.id %}">Discard</a>
</form>
{% endblock %}
