{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Organizer</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-book-open"></i>Academic Notes Organizer</h1>
        <div class="header-actions">
            {% if user.is_authenticated %}
            <form action="{% url 'notes:search_notes' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search in notes..." required>
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
            <div class="user-profile">
                <i class="fas fa-user-circle"></i> {{ user.username }}
            </div>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Log Out</button>
            </form>
            {% endif %}
        </div>
    </header>
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
